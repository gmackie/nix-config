# Example secrets file - encrypt with: sops -e -i secrets/secrets.yaml
#
# After encrypting, secrets will be available at:
#   /run/secrets/<secret-name>
#
# To edit encrypted secrets: sops secrets/secrets.yaml
#
# Template (replace with actual values before encrypting):
example_password: "changeme"
api_key: "your-api-key-here"

# Nested secrets example
database:
    username: "dbuser"
    password: "dbpassword"
